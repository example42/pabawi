apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "pabawi.fullname" . }}
  labels:
    {{- include "pabawi.labels" . | nindent 4 }}
data:
  PORT: {{ .Values.containerPort | quote }}
  HOST: {{ .Values.config.host | quote }}
  LOG_LEVEL: {{ .Values.config.logLevel | quote }}
  DB_TYPE: {{ .Values.database.type | quote }}
  {{- if eq .Values.database.type "sqlite" }}
  DATABASE_PATH: {{ .Values.database.sqlite.path | quote }}
  {{- end }}
  BOLT_PROJECT_PATH: {{ .Values.config.boltProjectPath | quote }}
  HIERA_CONTROL_REPO_PATH: {{ .Values.config.hieraControlRepoPath | quote }}
  ANSIBLE_PROJECT_PATH: {{ .Values.config.ansibleProjectPath | quote }}
  SSH_CONFIG_PATH: {{ .Values.config.sshConfigPath | quote }}
  SSH_DEFAULT_KEY: {{ .Values.config.sshDefaultKey | quote }}
  COMMAND_WHITELIST_ALLOW_ALL: {{ .Values.config.commandWhitelistAllowAll | quote }}
  COMMAND_WHITELIST_MATCH_MODE: {{ .Values.config.commandWhitelistMatchMode | quote }}
  COMMAND_WHITELIST: {{ .Values.config.commandWhitelist | quote }}
  BOLT_EXECUTION_TIMEOUT: {{ .Values.config.boltExecutionTimeout | quote }}
  CACHE_INVENTORY_TTL: {{ .Values.config.cacheInventoryTtl | quote }}
  CACHE_FACTS_TTL: {{ .Values.config.cacheFactsTtl | quote }}
  CONCURRENT_EXECUTION_LIMIT: {{ .Values.config.concurrentExecutionLimit | quote }}
  MAX_QUEUE_SIZE: {{ .Values.config.maxQueueSize | quote }}
  ALLOW_DESTRUCTIVE_PROVISIONING: {{ .Values.config.allowDestructiveProvisioning | quote }}
  CORS_ALLOWED_ORIGINS: {{ .Values.config.corsAllowedOrigins | quote }}
  MCP_ENABLED: {{ .Values.config.mcpEnabled | quote }}
  UI_SHOW_HOME_PAGE_RUN_CHART: {{ .Values.config.uiShowHomePageRunChart | quote }}
  PUPPETDB_ENABLED: {{ .Values.integrations.puppetdb.enabled | quote }}
  {{- if .Values.integrations.puppetdb.serverUrl }}
  PUPPETDB_SERVER_URL: {{ .Values.integrations.puppetdb.serverUrl | quote }}
  {{- end }}
  {{- if .Values.integrations.puppetdb.port }}
  PUPPETDB_PORT: {{ .Values.integrations.puppetdb.port | quote }}
  {{- end }}
  PUPPETDB_SSL_CA: {{ .Values.integrations.puppetdb.sslCa | quote }}
  PUPPETDB_SSL_CERT: {{ .Values.integrations.puppetdb.sslCert | quote }}
  PUPPETDB_SSL_KEY: {{ .Values.integrations.puppetdb.sslKey | quote }}
  PUPPETSERVER_ENABLED: {{ .Values.integrations.puppetserver.enabled | quote }}
  {{- if .Values.integrations.puppetserver.serverUrl }}
  PUPPETSERVER_SERVER_URL: {{ .Values.integrations.puppetserver.serverUrl | quote }}
  {{- end }}
  HIERA_ENABLED: {{ .Values.integrations.hiera.enabled | quote }}
  ANSIBLE_ENABLED: {{ .Values.integrations.ansible.enabled | quote }}
  SSH_ENABLED: {{ .Values.integrations.ssh.enabled | quote }}
  PROXMOX_ENABLED: {{ .Values.integrations.proxmox.enabled | quote }}
  AWS_ENABLED: {{ .Values.integrations.aws.enabled | quote }}
  AZURE_ENABLED: {{ .Values.integrations.azure.enabled | quote }}
