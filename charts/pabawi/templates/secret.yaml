{{- if and .Values.secrets.create (not .Values.secrets.existingSecret) }}
{{- $secretName := include "pabawi.secretName" . -}}
{{- $jwt := .Values.secrets.jwtSecret -}}
{{- if not $jwt -}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName -}}
{{- if and $existing $existing.data -}}
{{- $jwt = (get $existing.data "JWT_SECRET" | b64dec) -}}
{{- end -}}
{{- end -}}
{{- if not $jwt -}}
{{- $jwt = randAlphaNum 48 -}}
{{- end -}}
{{- if and (eq .Values.database.type "postgres") (not .Values.database.postgres.existingSecret) (not .Values.database.postgres.url) -}}
{{- if not .Values.postgresql.enabled -}}
{{- $_ := required "database.postgres.host is required when database.type=postgres, postgresql.enabled=false, and database.postgres.existingSecret/url are not set" .Values.database.postgres.host -}}
{{- end -}}
{{- $_ := required "database.postgres.password or postgresql.auth.password is required when constructing DATABASE_URL" (default .Values.postgresql.auth.password .Values.database.postgres.password) -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "pabawi.labels" . | nindent 4 }}
type: Opaque
stringData:
  JWT_SECRET: {{ $jwt | quote }}
  {{- if .Values.secrets.lifecycleToken }}
  PABAWI_LIFECYCLE_TOKEN: {{ .Values.secrets.lifecycleToken | quote }}
  {{- end }}
  {{- if .Values.secrets.mcpAuthToken }}
  MCP_AUTH_TOKEN: {{ .Values.secrets.mcpAuthToken | quote }}
  {{- end }}
  {{- if and (eq .Values.database.type "postgres") (not .Values.database.postgres.existingSecret) }}
  DATABASE_URL: {{ include "pabawi.databaseUrl" . | quote }}
  {{- end }}
  {{- range $key, $value := .Values.secretEnv }}
  {{ $key }}: {{ tpl (toString $value) $ | quote }}
  {{- end }}
{{- end }}
