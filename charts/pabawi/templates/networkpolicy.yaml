{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "pabawi.fullname" . }}
  labels:
    {{- include "pabawi.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "pabawi.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - {{- with .Values.networkPolicy.ingress.from }}
      from:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      ports:
        - protocol: TCP
          port: {{ .Values.containerPort }}
  egress:
    {{- if .Values.networkPolicy.egress.allowAll }}
    - {}
    {{- else }}
    {{- toYaml .Values.networkPolicy.egress.rules | nindent 4 }}
    {{- end }}
{{- end }}
