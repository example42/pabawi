          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /users/{id}/roles/{roleId}:
    delete:
      summary: Remove role from user
      tags:
        - RBAC
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: roleId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Role removed successfully
        '404':
          description: User or role not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /users/{id}/sessions:
    delete:
      summary: Revoke user sessions
      description: Invalidate all active sessions for a user
      tags:
        - RBAC
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Sessions revoked successfully

  /roles:
    post:
      summary: Create role
      tags:
        - RBAC
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                description:
                  type: string
      responses:
        '201':
          description: Role created successfully
    get:
      summary: List roles
      tags:
        - RBAC
      responses:
        '200':
          description: Roles retrieved successfully

  /roles/{id}:
    get:
      summary: Get role
      tags:
        - RBAC
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Role retrieved successfully
        '404':
          description: Role not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    put:
      summary: Update role
      tags:
        - RBAC
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
      responses:
        '200':
          description: Role updated successfully
        '404':
          description: Role not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      summary: Delete role
      tags:
        - RBAC
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Role deleted successfully
        '404':
          description: Role not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /roles/{id}/permissions:
    post:
      summary: Assign permission to role
      tags:
        - RBAC
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - permissionId
              properties:
                permissionId:
                  type: string
      responses:
        '200':
          description: Permission assigned successfully
        '404':
          description: Role or permission not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /roles/{id}/permissions/{permId}:
    delete:
      summary: Remove permission from role
      tags:
        - RBAC
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: permId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Permission removed successfully

  /permissions:
    post:
      summary: Create permission
      tags:
        - RBAC
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - resource
                - action
              properties:
                resource:
                  type: string
                  example: journal
                action:
                  type: string
                  example: read
      responses:
        '201':
          description: Permission created successfully
    get:
      summary: List permissions
      tags:
        - RBAC
      responses:
        '200':
          description: Permissions retrieved successfully

  /groups:
    post:
      summary: Create group
      tags:
        - RBAC
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                description:
                  type: string
      responses:
        '201':
          description: Group created successfully
    get:
      summary: List groups
      tags:
        - RBAC
      responses:
        '200':
          description: Groups retrieved successfully

  /groups/{id}:
    get:
      summary: Get group
      tags:
        - RBAC
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Group retrieved successfully
        '404':
          description: Group not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    put:
      summary: Update group
      tags:
        - RBAC
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
      responses:
        '200':
          description: Group updated successfully
    delete:
      summary: Delete group
      tags:
        - RBAC
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Group deleted successfully

  /groups/{id}/users:
    post:
      summary: Add user to group
      tags:
        - RBAC
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - userId
              properties:
                userId:
                  type: string
      responses:
        '200':
          description: User added to group
        '404':
          description: Group or user not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /groups/{id}/users/{userId}:
    delete:
      summary: Remove user from group
      tags:
        - RBAC
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: User removed from group

  /setup/status:
    get:
      summary: Get setup status
      description: Return whether the initial setup wizard has been completed
      tags:
        - Setup
      responses:
        '200':
          description: Setup status retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  completed:
                    type: boolean

  /setup/complete:
    post:
      summary: Mark setup as complete
      description: Mark the initial setup wizard as completed
      tags:
        - Setup
      responses:
        '200':
          description: Setup marked as complete

  /monitoring/metrics:
    get:
      summary: Get performance metrics
      description: Return current performance metrics (memory, CPU, uptime)
      tags:
        - Monitoring
      responses:
        '200':
          description: Metrics retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  memory:
                    type: object
                    properties:
                      heapUsed:
                        type: integer
                      heapTotal:
                        type: integer
                      rss:
                        type: integer
                  uptime:
                    type: number
                    description: Process uptime in seconds

  /monitoring/journal:
    get:
      summary: Get system journal
      description: Return recent system-level journal entries (process events, startup, errors)
      tags:
        - Monitoring
      responses:
        '200':
          description: System journal retrieved successfully

components:
  parameters:
    NodeId:
      name: id
      in: path
      required: true
      description: Node identifier (name or ID)
      schema:
        type: string
        example: node1

    ExpertModeHeader:
      name: X-Expert-Mode
      in: header
      description: Enable expert mode for detailed error output
      schema:
        type: boolean
        default: false

  schemas:
    Node:
      type: object
      properties:
        id:
          type: string
          description: Unique node identifier
        name:
          type: string
          description: Node name
        uri:
          type: string
          description: Connection URI
        transport:
          type: string
          enum: [ssh, winrm, docker, local]
          description: Transport protocol
        config:
          type: object
          description: Node configuration
          properties:
            user:
              type: string
            port:
              type: integer
          additionalProperties: true
      example:
        id: node1
        name: node1
        uri: ssh://node1.example.com
        transport: ssh
        config:
          user: admin
          port: 22

    Facts:
      type: object
      properties:
        nodeId:
          type: string
        gatheredAt:
          type: string
          format: date-time
        facts:
          type: object
          properties:
            os:
              type: object
              properties:
                family:
                  type: string
                name:
                  type: string
                release:
                  type: object
                  properties:
                    full:
                      type: string
                    major:
                      type: string
            processors:
              type: object
              properties:
                count:
                  type: integer
                models:
                  type: array
                  items:
                    type: string
            memory:
              type: object
              properties:
                system:
                  type: object
                  properties:
                    total:
                      type: string
                    available:
                      type: string
            networking:
              type: object
              properties:
                hostname:
                  type: string
                interfaces:
                  type: object
                  additionalProperties: true
          additionalProperties: true
        command:
          type: string
          description: Bolt command used to gather facts (expert mode)

    Task:
      type: object
      properties:
        name:
          type: string
          description: Task name
        module:
          type: string
          description: Module name
        description:
          type: string
          description: Task description
        parameters:
          type: array
          items:
            $ref: '#/components/schemas/TaskParameter'
        modulePath:
          type: string
          description: Path to module
      example:
        name: psick::puppet_agent
        module: psick
        description: Run Puppet agent
        parameters:
          - name: noop
            type: Boolean
            description: Enable noop mode
            required: false
            default: false
        modulePath: /path/to/modules/psick

    TaskParameter:
      type: object
      properties:
        name:
          type: string
        type:
          type: string
          enum: [String, Integer, Boolean, Array, Hash]
        description:
          type: string
        required:
          type: boolean
        default:
          description: Default value
        enum:
          type: array
          items:
            type: string
          description: Allowed values for enum types
        puppetType:
          type: string
          description: Original Puppet type string

    ExecutionStarted:
      type: object
      properties:
        executionId:
          type: string
          description: Unique execution identifier
        status:
          type: string
          enum: [running]
        message:
          type: string
      example:
        executionId: abc123def456  # pragma: allowlist secret
        status: running
        message: Command execution started

    ExecutionRecord:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
          enum: [command, task, facts, puppet, package]
        targetNodes:
          type: array
          items:
            type: string
        action:
          type: string
          description: Command string or task name
        parameters:
          type: object
          additionalProperties: true
        status:
          type: string
          enum: [running, success, failed, partial]
        startedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
        results:
          type: array
          items:
            $ref: '#/components/schemas/NodeResult'
        error:
          type: string
        command:
          type: string
          description: Bolt CLI command executed (expert mode)
        expertMode:
          type: boolean
          description: Whether expert mode was enabled

    NodeResult:
      type: object
      properties:
        nodeId:
          type: string
        status:
          type: string
          enum: [success, failed]
        output:
          type: object
          properties:
            stdout:
              type: string
            stderr:
              type: string
            exitCode:
              type: integer
        value:
          description: Task result value
        error:
          type: string
        duration:
          type: integer
          description: Execution duration in milliseconds

    Error:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
              description: Machine-readable error code
            message:
              type: string
              description: Human-readable error message
            details:
              description: Additional error details
      example:
        error:
          code: INVALID_REQUEST
          message: Request validation failed
          details: Command is required

    ErrorWithExpertMode:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
              description: Machine-readable error code
            message:
              type: string
              description: Human-readable error message
            details:
              description: Additional error details
            stackTrace:
              type: string
              description: Full stack trace (expert mode only)
            requestId:
              type: string
              description: Request correlation ID (expert mode only)
            timestamp:
              type: string
              format: date-time
              description: Error timestamp (expert mode only)
            rawResponse:
              description: Raw Bolt CLI output (expert mode only)
            executionContext:
              type: object
              description: Execution context (expert mode only)
              properties:
                endpoint:
                  type: string
                method:
                  type: string
                requestId:
                  type: string
      example:
        error:
          code: BOLT_EXECUTION_FAILED
          message: Bolt command failed
          details: Connection timeout
          stackTrace: "Error: Bolt command failed\n    at BoltService.runCommand..."
          requestId: req-abc123
          timestamp: "2024-01-01T00:00:00.000Z"
          rawResponse: "Error: Connection timeout after 30s"
          executionContext:
            endpoint: /api/nodes/node1/command
            method: POST
            requestId: req-abc123

    PuppetReport:
      type: object
      properties:
        hash:
          type: string
          description: Unique report hash
        certname:
          type: string
          description: Node certificate name
        puppet_version:
          type: string
        report_format:
          type: integer
        configuration_version:
          type: string
        start_time:
          type: string
          format: date-time
        end_time:
          type: string
          format: date-time
        producer_timestamp:
          type: string
          format: date-time
        receive_time:
          type: string
          format: date-time
        transaction_uuid:
          type: string
        catalog_uuid:
          type: string
        code_id:
          type: string
        job_id:
          type: string
        cached_catalog_status:
          type: string
        status:
          type: string
          enum: [changed, unchanged, failed]
        noop:
          type: boolean
        noop_pending:
          type: boolean
        environment:
          type: string
        logs:
          type: array
          items:
            type: object
        metrics:
          type: object
        resource_events:
          type: object

    PuppetReportDetail:
      allOf:
        - $ref: '#/components/schemas/PuppetReport'
        - type: object
          properties:
            resource_events:
              type: object
              properties:
                data:
                  type: array
                  items:
                    type: object
                    properties:
                      status:
                        type: string
                      timestamp:
                        type: string
                        format: date-time
                      resource_type:
                        type: string
                      resource_title:
                        type: string
                      property:
                        type: string
                      new_value:
                        description: New value for the property
                      old_value:
                        description: Previous value for the property
                      message:
                        type: string
                      file:
                        type: string
                      line:
                        type: integer
                      containment_path:
                        type: array
                        items:
                          type: string

    ReportsSummary:
      type: object
      properties:
        total:
          type: integer
          description: Total number of reports analyzed
        failed:
          type: integer
          description: Number of failed reports
        changed:
          type: integer
          description: Number of reports with changes
        unchanged:
          type: integer
          description: Number of unchanged reports
        noop:
          type: integer
          description: Number of noop reports
        timeRange:
          type: object
          properties:
            start:
              type: string
              format: date-time
            end:
              type: string
              format: date-time

    NodeStatus:
      type: object
      properties:
        certname:
          type: string
        catalog_environment:
          type: string
        report_environment:
          type: string
        report_timestamp:
          type: string
          format: date-time
        catalog_timestamp:
          type: string
          format: date-time
        facts_timestamp:
          type: string
          format: date-time
        latest_report_hash:
          type: string
        latest_report_status:
          type: string
          enum: [changed, unchanged, failed]
        latest_report_noop:
          type: boolean

    HieraKeyInfo:
      type: object
      properties:
        name:
          type: string
          description: Hiera key name
        locationCount:
          type: integer
          description: Number of locations where this key is defined
        hasLookupOptions:
          type: boolean
          description: Whether the key has lookup options defined
      example:
        name: apache::port
        locationCount: 3
        hasLookupOptions: false

    JournalEntry:
      type: object
      properties:
        id:
          type: string
        nodeId:
          type: string
        eventType:
          type: string
          description: Event category (e.g. puppet-run, task, provision, note)
        source:
          type: string
          description: Integration source (e.g. puppetdb, proxmox, aws, azure, execution)
        summary:
          type: string
          description: Short human-readable description of the event
        details:
          type: object
          additionalProperties: true
          description: Source-specific event data
        timestamp:
          type: string
          format: date-time
        status:
          type: string
          enum: [success, failed, running, unknown]
      example:
        id: jrn-abc123
        nodeId: web-01.example.com
        eventType: puppet-run
        source: puppetdb
        summary: Puppet run changed 3 resources
        status: success
        timestamp: '2026-04-28T10:00:00.000Z'

    AzureVm:
      type: object
      properties:
        id:
          type: string
          description: Azure resource ID
        name:
          type: string
        resourceGroup:
          type: string
        location:
          type: string
          example: eastus
        vmSize:
          type: string
          example: Standard_D2s_v3
        powerState:
          type: string
          enum: [running, stopped, deallocated, starting, stopping, deallocating, unknown]
        osType:
          type: string
          enum: [Linux, Windows]
        privateIpAddress:
          type: string
        publicIpAddress:
          type: string
        tags:
          type: object
          additionalProperties:
            type: string
        provisioningState:
          type: string
      example:
        id: /subscriptions/sub-id/resourceGroups/my-rg/providers/Microsoft.Compute/virtualMachines/my-vm
        name: my-vm
        resourceGroup: my-rg
        location: eastus
        vmSize: Standard_B1s
        powerState: running
        osType: Linux

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        JWT token obtained via `POST /api/auth/login`.
        Required on all endpoints when `AUTH_ENABLED=true`.

security:
  - bearerAuth: []
