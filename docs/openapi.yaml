openapi: 3.0.3
info:
  title: Pabawi API
  description: |
    REST API for Pabawi, an open source web frontend for managing classic infrastructure —
    physical servers, VMs, and the tools that run them.

    ## Integration Sources

    The API aggregates data from multiple integration sources:
    - **Bolt**: Task execution, command execution, and inventory
    - **PuppetDB**: Node inventory, facts, reports, catalogs, and events
    - **Puppetserver**: CA inventory, facts, catalog compilation, and environments
    - **Hiera**: Configuration data lookup and code analysis
    - **Ansible**: Inventory, ad-hoc commands, and playbook execution
    - **SSH**: Direct node management without a config management tool
    - **Proxmox**: VM and container inventory, provisioning, and lifecycle management
    - **AWS**: EC2 instance inventory, provisioning, and lifecycle management
    - **Azure**: VM inventory, provisioning, and lifecycle management *(v1.1.0)*

    ## Authentication

    When `AUTH_ENABLED=true`, most endpoints require a JWT token in the
    `Authorization: Bearer <token>` header. Obtain a token via `POST /api/auth/login`.

    ## Expert Mode

    Many endpoints support an "expert mode" that provides additional diagnostic information.
    Include the `X-Expert-Mode: true` header to enable it. Error responses will then include
    full stack traces, request IDs, execution context, and raw CLI output.

    ## Streaming Execution Output

    Long-running executions stream output in real time via Server-Sent Events (SSE).
    After starting an execution, connect to its `/stream` endpoint for live stdout/stderr
    and status updates.

    ## Journal

    The Journal system (v1.1.0) provides a cross-node event timeline aggregated from all
    enabled sources. Subscribe to `/journal/global/stream` for a live SSE feed, or query
    `/journal/{nodeId}` for a node's history.

  version: 1.1.0
  contact:
    name: Pabawi Support
    url: https://pabawi.example42.com
  license:
    name: Apache-2.0
    url: https://www.apache.org/licenses/LICENSE-2.0

servers:
  - url: http://localhost:3000/api
    description: Local development server
  - url: http://localhost:3000/api
    description: Production server

tags:
  - name: Inventory
    description: Node inventory management from multiple sources
  - name: Facts
    description: System facts gathering from multiple sources
  - name: Commands
    description: Command execution via Bolt
  - name: Tasks
    description: Bolt task execution
  - name: Puppet
    description: Puppet run management
  - name: Packages
    description: Package installation via Bolt tasks
  - name: Executions
    description: Execution history and results
  - name: Streaming
    description: Real-time execution output via SSE
  - name: System
    description: System configuration and health
  - name: Integrations
    description: Integration status and management
  - name: PuppetDB
    description: PuppetDB integration endpoints
  - name: Puppetserver
    description: Puppetserver integration endpoints
  - name: Hiera
    description: Hiera data lookup and analysis
  - name: Ansible
    description: Ansible playbook and ad-hoc command endpoints
  - name: SSH
    description: SSH direct execution endpoints
  - name: Proxmox
    description: Proxmox VM and container management
  - name: AWS
    description: AWS EC2 instance management
  - name: Azure
    description: Azure VM management (v1.1.0)
  - name: Provisioning
    description: Cross-integration provisioning discovery
  - name: Journal
    description: Cross-node event timeline (v1.1.0)
  - name: Auth
    description: Authentication — login, logout, current user
  - name: RBAC
    description: Users, roles, permissions, and groups
  - name: Setup
    description: Initial setup wizard
  - name: Monitoring
    description: Performance metrics and system journal
  - name: Debug
    description: Frontend log collection and troubleshooting

paths:
  /health:
    get:
      summary: Health check
      description: Check if the API server is running and properly configured
      tags:
        - System
      responses:
        '200':
          description: Server is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  message:
                    type: string
                    example: Backend API is running
                  config:
                    type: object
                    properties:
                      boltProjectPath:
                        type: string
                      commandWhitelistEnabled:
                        type: boolean
                      databaseInitialized:
                        type: boolean

  /config:
    get:
      summary: Get system configuration
      description: Retrieve system configuration (excluding sensitive values)
      tags:
        - System
      responses:
        '200':
          description: Configuration retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  commandWhitelist:
                    type: object
                    properties:
                      allowAll:
                        type: boolean
                        description: Whether all commands are allowed
                      whitelist:
                        type: array
                        items:
                          type: string
                        description: List of allowed commands (empty if allowAll is true)
                      matchMode:
                        type: string
                        enum: [exact, prefix]
                        description: How commands are matched against whitelist
                  executionTimeout:
                    type: integer
                    description: Execution timeout in milliseconds

  /config/ui:
    get:
      summary: Get UI configuration
      description: Retrieve UI configuration settings for the frontend
      tags:
        - System
      responses:
        '200':
          description: UI configuration retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  ui:
                    type: object

  /inventory:
    get:
      summary: List all nodes from inventory sources
      description: |
        Retrieve all nodes from all configured inventory sources (Bolt, PuppetDB, Puppetserver,
        Ansible, SSH, Proxmox, AWS, Azure). Nodes appearing in multiple sources are linked and
        returned as a single entry with a `sources` field.

        Query parameters:
        - sources: Comma-separated list of sources (e.g., "bolt,puppetdb,azure") or "all"
        - pql: PuppetDB PQL query for filtering (only applies when PuppetDB source is included)
        - sortBy: Sort field ("name" or "source")
        - sortOrder: Sort direction ("asc" or "desc")
      tags:
        - Inventory
      parameters:
        - name: sources
          in: query
          description: Comma-separated list of inventory sources
          schema:
            type: string
            example: "bolt,puppetdb"
        - name: pql
          in: query
          description: PuppetDB PQL query for filtering nodes
          schema:
            type: string
            example: 'nodes[certname] { certname ~ "web" }'
        - name: sortBy
          in: query
          description: Field to sort by
          schema:
            type: string
            enum: [name, source]
        - name: sortOrder
          in: query
          description: Sort direction
          schema:
            type: string
            enum: [asc, desc]
      responses:
        '200':
          description: Inventory retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  nodes:
                    type: array
                    items:
                      $ref: '#/components/schemas/Node'
                  sources:
                    type: object
                    additionalProperties:
                      type: object
                      properties:
                        nodeCount:
                          type: integer
                        lastSync:
                          type: string
                          format: date-time
                        status:
                          type: string
                          enum: [healthy, degraded, error]
        '400':
          description: Invalid query parameters (e.g., invalid PQL)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Bolt inventory not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /inventory/sources:
    get:
      summary: List available inventory sources
      description: Return available inventory sources and their connection status
      tags:
        - Inventory
      responses:
        '200':
          description: Sources retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  sources:
                    type: object
                    additionalProperties:
                      type: object
                      properties:
                        type:
                          type: string
                          enum: [execution, information, both]
                        status:
                          type: string
                          enum: [connected, disconnected, error]
                        lastCheck:
                          type: string
                          format: date-time
                        error:
                          type: string

  /integrations/status:
    get:
      summary: Get integration status
      description: |
        Return status for all configured integrations including connection health,
        last check time, and error details if unhealthy.
      tags:
        - Integrations
      parameters:
        - name: refresh
          in: query
          description: Force fresh health check instead of using cache
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: Integration status retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  integrations:
                    type: array
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                        type:
                          type: string
                          enum: [execution, information, both]
                        status:
                          type: string
                          enum: [connected, degraded, error, not_configured]
                        lastCheck:
                          type: string
                          format: date-time
                        message:
                          type: string
                        details:
                          type: object
                        workingCapabilities:
                          type: array
                          items:
                            type: string
                        failingCapabilities:
                          type: array
                          items:
                            type: string
                  timestamp:
                    type: string
                    format: date-time
                  cached:
                    type: boolean

  /integrations/colors:
    get:
      summary: Get integration colors
      description: Return the color palette for all integrations (bolt, puppetdb, puppetserver, hiera, ansible, ssh, proxmox, aws, azure)
      tags:
        - Integrations
      responses:
        '200':
          description: Integration colors retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  colors:
                    type: object
                  integrations:
                    type: array
                    items:
                      type: string

  /integrations/puppetdb/nodes:
    get:
      summary: List nodes from PuppetDB
      description: Return all nodes from PuppetDB inventory with optional PQL filtering
      tags:
        - PuppetDB
      parameters:
        - name: query
          in: query
          description: PQL query for filtering nodes
          schema:
            type: string
      responses:
        '200':
          description: Nodes retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  nodes:
                    type: array
                    items:
                      $ref: '#/components/schemas/Node'
                  source:
                    type: string
                    example: puppetdb
                  count:
                    type: integer
        '400':
          description: Invalid PQL query
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '503':
          description: PuppetDB not configured or not initialized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /integrations/puppetdb/nodes/{certname}:
    get:
      summary: Get node details from PuppetDB
      description: Return specific node details from PuppetDB
      tags:
        - PuppetDB
      parameters:
        - name: certname
          in: path
          required: true
          description: Node certificate name
          schema:
            type: string
      responses:
        '200':
          description: Node details retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  node:
                    $ref: '#/components/schemas/Node'
                  source:
                    type: string
                    example: puppetdb
        '404':
          description: Node not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /integrations/puppetdb/nodes/{certname}/facts:
    get:
      summary: Get node facts from PuppetDB
      description: Return facts for a specific node from PuppetDB with categorization
      tags:
        - PuppetDB
      parameters:
        - name: certname
          in: path
          required: true
          description: Node certificate name
          schema:
            type: string
      responses:
        '200':
          description: Facts retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  facts:
                    $ref: '#/components/schemas/Facts'
                  source:
                    type: string
                    example: puppetdb

  /integrations/puppetdb/nodes/{certname}/reports:
    get:
      summary: Get Puppet reports for a node
      description: Return recent Puppet reports for a specific node from PuppetDB
      tags:
        - PuppetDB
      parameters:
        - name: certname
          in: path
          required: true
          description: Node certificate name
          schema:
            type: string
        - name: limit
          in: query
          description: Maximum number of reports to return
          schema:
            type: integer
            default: 10
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: Reports retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  reports:
                    type: array
                    items:
                      $ref: '#/components/schemas/PuppetReport'
                  source:
                    type: string
                    example: puppetdb
                  count:
                    type: integer

  /integrations/puppetdb/reports/summary:
    get:
      summary: Get reports summary statistics
      description: Return summary statistics of recent Puppet reports across all nodes
      tags:
        - PuppetDB
      parameters:
        - name: limit
          in: query
          description: Maximum number of reports to analyze
          schema:
            type: integer
            default: 100
        - name: hours
          in: query
          description: Number of hours to look back for reports
          schema:
            type: integer
      responses:
        '200':
          description: Summary retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  summary:
                    $ref: '#/components/schemas/ReportsSummary'
                  source:
                    type: string
                    example: puppetdb

  /integrations/puppetdb/reports:
    get:
      summary: Get all Puppet reports
      description: Return recent Puppet reports across all nodes from PuppetDB
      tags:
        - PuppetDB
      parameters:
        - name: limit
          in: query
          description: Maximum number of reports to return
          schema:
            type: integer
            default: 100
        - name: status
          in: query
          description: Filter by report status
          schema:
            type: string
      responses:
        '200':
          description: Reports retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  reports:
                    type: array
                    items:
                      $ref: '#/components/schemas/PuppetReport'
                  source:
                    type: string
                    example: puppetdb

  /integrations/puppetdb/nodes/{certname}/reports/{hash}:
    get:
      summary: Get report details
      description: Return detailed information for a specific Puppet report
      tags:
        - PuppetDB
      parameters:
        - name: certname
          in: path
          required: true
          schema:
            type: string
        - name: hash
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Report retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PuppetReportDetail'
        '404':
          description: Report not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /integrations/puppetdb/nodes/{certname}/catalog:
    get:
      summary: Get node catalog
      description: Return Puppet catalog for a specific node from PuppetDB
      tags:
        - PuppetDB
      parameters:
        - name: certname
          in: path
          required: true
          schema:
            type: string
        - name: resourceType
          in: query
          description: Optional resource type filter
          schema:
            type: string
      responses:
        '200':
          description: Catalog retrieved successfully
        '404':
          description: Node not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /integrations/puppetdb/nodes/{certname}/resources:
    get:
      summary: Get node resources
      description: Return managed resources for a specific node from PuppetDB
      tags:
        - PuppetDB
      parameters:
        - name: certname
          in: path
          required: true
          schema:
            type: string
        - name: resourceType
          in: query
          description: Optional resource type filter
          schema:
            type: string
      responses:
        '200':
          description: Resources retrieved successfully
        '404':
          description: Node not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /integrations/puppetdb/nodes/{certname}/events:
    get:
      summary: Get node events
      description: Return Puppet events for a specific node from PuppetDB
      tags:
        - PuppetDB
      parameters:
        - name: certname
          in: path
          required: true
          schema:
            type: string
        - name: status
          in: query
          description: Filter by event status
          schema:
            type: string
      responses:
        '200':
          description: Events retrieved successfully

  /integrations/puppetdb/admin/summary-stats:
    get:
      summary: Get PuppetDB summary statistics
      description: Return summary statistics from the PuppetDB admin API (resource intensive on large instances)
      tags:
        - PuppetDB
      responses:
        '200':
          description: Summary statistics retrieved successfully
          content:
            application/json:
              schema:
                type: object
        '503':
          description: PuppetDB not configured
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /integrations/puppetserver/nodes:
    get:
      summary: List nodes from Puppetserver CA
      description: Return all nodes from Puppetserver CA inventory
      tags:
        - Puppetserver
      responses:
        '200':
          description: Nodes retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  nodes:
                    type: array
                    items:
                      $ref: '#/components/schemas/Node'
                  source:
                    type: string
                    example: puppetserver
                  count:
                    type: integer

  /integrations/puppetserver/nodes/{certname}:
    get:
      summary: Get node details
      description: Return specific node details from Puppetserver CA
      tags:
        - Puppetserver
      parameters:
        - name: certname
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Node retrieved successfully
        '404':
          description: Node not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /integrations/puppetserver/nodes/{certname}/status:
    get:
      summary: Get comprehensive node status
      description: |
        Return comprehensive node status from PuppetDB and Puppetserver including
        last run timestamp, catalog version, run status, and activity categorization.
      tags:
        - Puppetserver
      parameters:
        - name: certname
          in: path
          required: true
          description: Node certificate name
          schema:
            type: string
      responses:
        '200':
          description: Node status retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    $ref: '#/components/schemas/NodeStatus'
                  activityCategory:
                    type: string
                    enum: [active, inactive, never_checked_in]
                  shouldHighlight:
                    type: boolean
                  secondsSinceLastCheckIn:
                    type: integer
                  source:
                    type: string
                    enum: [puppetdb, puppetserver]

  /integrations/puppetserver/nodes/{certname}/facts:
    get:
      summary: Get node facts
      description: Return facts for a specific node from Puppetserver
      tags:
        - Puppetserver
      parameters:
        - name: certname
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Facts retrieved successfully
        '404':
          description: Node not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /integrations/puppetserver/catalog/{certname}/{environment}:
    get:
      summary: Compile catalog
      description: Compile catalog for a node in a specific environment
      tags:
        - Puppetserver
      parameters:
        - name: certname
          in: path
          required: true
          schema:
            type: string
        - name: environment
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Catalog compiled successfully

  /integrations/puppetserver/catalog/compare:
    post:
      summary: Compare catalogs
      description: Compare catalogs between two environments for a node
      tags:
        - Puppetserver
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                certname:
                  type: string
                environment1:
                  type: string
                environment2:
                  type: string
      responses:
        '200':
          description: Catalog comparison completed

  /integrations/puppetserver/environments:
    get:
      summary: List environments
      description: Return all Puppetserver environments
      tags:
        - Puppetserver
      responses:
        '200':
          description: Environments retrieved successfully

  /integrations/puppetserver/environments/{name}:
    get:
      summary: Get environment details
      description: Return details for a specific Puppetserver environment
      tags:
        - Puppetserver
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Environment retrieved successfully

  /integrations/puppetserver/environments/{name}/deploy:
    post:
      summary: Deploy environment
      description: Trigger deployment for a specific Puppetserver environment
      tags:
        - Puppetserver
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Environment deployment triggered

  /integrations/puppetserver/environments/{name}/cache:
    delete:
      summary: Flush environment cache
      description: Flush the environment cache for a specific Puppetserver environment
      tags:
        - Puppetserver
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Environment cache flushed successfully

  /integrations/puppetserver/status/services:
    get:
      summary: Get Puppetserver services status
      description: Return detailed service status from Puppetserver
      tags:
        - Puppetserver
      responses:
        '200':
          description: Services status retrieved successfully

  /integrations/puppetserver/status/simple:
    get:
      summary: Get simple Puppetserver status
      description: Return lightweight status from Puppetserver
      tags:
        - Puppetserver
      responses:
        '200':
          description: Simple status retrieved successfully

  /integrations/puppetserver/admin-api:
    get:
      summary: Get Puppetserver admin API info
      description: Return information about available Puppetserver admin API operations
      tags:
        - Puppetserver
      responses:
        '200':
          description: Admin API info retrieved successfully

  /integrations/puppetserver/metrics:
    get:
      summary: Get Puppetserver metrics
      description: Return metrics from Puppetserver (Jolokia)
      tags:
        - Puppetserver
      parameters:
        - name: mbean
          in: query
          description: Optional MBean name to query
          schema:
            type: string
      responses:
        '200':
          description: Metrics retrieved successfully

  /integrations/hiera/status:
    get:
      summary: Get Hiera integration status
      description: Return status of the Hiera integration including configuration and health
      tags:
        - Hiera
      responses:
        '200':
          description: Status retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  enabled:
                    type: boolean
                  configured:
                    type: boolean
                  healthy:
                    type: boolean
                  controlRepoPath:
                    type: string
                  lastScan:
                    type: string
                    format: date-time
                  keyCount:
                    type: integer
                  fileCount:
                    type: integer
                  message:
                    type: string

  /integrations/hiera/reload:
    post:
      summary: Reload Hiera control repository
      description: Reload control repository data and rescan for Hiera keys
      tags:
        - Hiera
      responses:
        '200':
          description: Repository reloaded successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  keyCount:
                    type: integer
                  fileCount:
                    type: integer
                  lastScan:
                    type: string
                    format: date-time

  /integrations/hiera/keys:
    get:
      summary: List all Hiera keys
      description: Return all discovered Hiera keys with pagination
      tags:
        - Hiera
      parameters:
        - name: page
          in: query
          description: Page number
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: pageSize
          in: query
          description: Number of items per page
          schema:
            type: integer
            default: 50
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: Keys retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  keys:
                    type: array
                    items:
                      $ref: '#/components/schemas/HieraKeyInfo'
                  total:
                    type: integer
                  page:
                    type: integer
                  pageSize:
                    type: integer
                  totalPages:
                    type: integer

  /integrations/hiera/nodes/{nodeId}/keys/{key}:
    get:
      summary: Resolve Hiera key for node
      description: Resolve a specific Hiera key for a node showing value and resolution path
      tags:
        - Hiera
      parameters:
        - name: nodeId
          in: path
          required: true
          description: Node identifier
          schema:
            type: string
        - name: key
          in: path
