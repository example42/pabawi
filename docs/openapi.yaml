  /journal/global/stream:
    get:
      summary: Stream global journal events (SSE)
      description: |
        Stream journal events across all nodes via Server-Sent Events.
        Supports filtering by node IDs, group, event type, source, and date range.
        Requires `journal:read` RBAC permission.
      tags:
        - Journal
      parameters:
        - name: nodeIds
          in: query
          description: Comma-separated node IDs to include
          schema:
            type: string
        - name: groupId
          in: query
          description: Inventory group ID to filter by
          schema:
            type: string
        - name: startDate
          in: query
          description: ISO 8601 start datetime (inclusive)
          schema:
            type: string
            format: date-time
        - name: endDate
          in: query
          description: ISO 8601 end datetime (inclusive)
          schema:
            type: string
            format: date-time
        - name: eventType
          in: query
          description: Comma-separated event types to include
          schema:
            type: string
        - name: source
          in: query
          description: Comma-separated source names to include
          schema:
            type: string
      responses:
        '200':
          description: SSE stream established
          content:
            text/event-stream:
              schema:
                type: string
                description: |
                  SSE stream. Event types: `entry` (JournalEntry JSON), `complete`, `error`
        '400':
          description: Invalid query parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

