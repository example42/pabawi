      tags:
        - Azure
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - resourceGroup
                - vmName
                - location
                - imageReference
                - adminUsername
                - networkInterfaceId
              properties:
                resourceGroup:
                  type: string
                  example: my-rg
                vmName:
                  type: string
                  example: my-vm
                location:
                  type: string
                  example: eastus
                vmSize:
                  type: string
                  default: Standard_B1s
                  example: Standard_D2s_v3
                imageReference:
                  type: object
                  required:
                    - publisher
                    - offer
                    - sku
                  properties:
                    publisher:
                      type: string
                      example: Canonical
                    offer:
                      type: string
                      example: UbuntuServer
                    sku:
                      type: string
                      example: 18.04-LTS
                    version:
                      type: string
                      default: latest
                adminUsername:
                  type: string
                  example: azureuser
                adminPassword:
                  type: string
                  description: Required if sshPublicKey is not provided
                sshPublicKey:
                  type: string
                  description: SSH public key (recommended over password)
                networkInterfaceId:
                  type: string
                  description: Resource ID of the network interface to attach
      responses:
        '201':
          description: VM provisioned successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    type: object
                    properties:
                      status:
                        type: string
                        enum: [success, failed]
                      vmId:
                        type: string
        '400':
          description: Validation error
          content:
            application/json:
              schema:
