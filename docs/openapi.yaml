        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                tags:
                  type: array
                  items:
                    type: string
                  description: Puppet tags to limit scope
                  example: [webserver, database]
                environment:
                  type: string
                  description: Puppet environment
                  example: production
                noop:
                  type: boolean
                  description: Enable noop (dry-run) mode
                  default: false
                noNoop:
                  type: boolean
                  description: Override noop setting on node
                  default: false
                debug:
                  type: boolean
                  description: Enable debug output
                  default: false
                expertMode:
                  type: boolean
                  description: Enable expert mode for detailed output
                  default: false
      responses:
        '202':
          description: Puppet run started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExecutionStarted'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Node not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorWithExpertMode'

